<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
  <h1><span id="temp">TURN</span></h1>

      <table>
    <tr>
      <td><button onclick="changeval('00')"><span id="00">EMPTY</span></button></td>
      <td><button onclick="changeval('01')"><span id="01">EMPTY</span></td>
      <td><button onclick="changeval('02')"><span id="02">EMPTY</span></td>
    </tr>
    <tr>
      <td><button onclick="changeval('10')"><span id="10">EMPTY</span></td>
      <td><button onclick="changeval('11')"><span id="11">EMPTY</span></td>
      <td><button onclick="changeval('12')"><span id="12">EMPTY</span></td>
    </tr>
    <tr>
      <td><button onclick="changeval('20')"><span id="20">EMPTY</span></td>
      <td><button onclick="changeval('21')"><span id="21">EMPTY</span></td>
      <td><button onclick="changeval('22')"><span id="22">EMPTY</span></td>
    </tr>
  </table>

    <div id="winPopup" class="popup-overlay" onclick="closePopup()">
      <div class="popup-content">
        <h1><span id="wintext">WE HAVE A WINNER</span></h1>
        <h2>CLICK WILL TO PLAY AGAIN</h2>
          <img src="WILL.jpg" alt="Winner"onclick="location.reload()">
      </div>
    </div>
  <script src="./main.js"></script>
</body>
</html>
